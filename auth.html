<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance | Authentication</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1594938291221-94f18cbb5660?auto=format&fit=crop&q=80&w=2000') center/cover no-repeat;
            position: relative;
        }
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 13, 13, 0.7);
        }
        .auth-box {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: var(--spacing-xl);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .auth-box h2 {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
        }
        .auth-tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            font-weight: 600;
        }
        
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }
        
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #fff;
            font-size: 1.5rem;
            transition: transform var(--transition-fast);
        }
        .back-home:hover {
            transform: scale(1.1);
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home" title="Back to Home"><i class="fa-solid fa-arrow-left"></i></a>

    <div class="auth-wrapper">
        <div class="auth-overlay"></div>
        
        <div class="auth-box fade-in">
            <h2>Account</h2>
            <div class="auth-tabs">
                <div class="auth-tab active" data-target="login-form">Login</div>
                <div class="auth-tab" data-target="register-form">Register</div>
            </div>
            
            <form id="login-form" class="auth-form active" action="index.html">
                <div class="form-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
                <p class="text-center" style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                    <a href="#">Forgot Password?</a>
                </p>
            </form>
            
            <form id="register-form" class="auth-form" action="index.html">
                <div class="form-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // Remove active from all tabs & forms
                    tabs.forEach(t => t.classList.remove('active'));
                    forms.forEach(f => f.classList.remove('active'));
                    
                    // Add active to clicked tab
                    tab.classList.add('active');
                    
                    // Add active to corresponding form
                    const targetId = tab.getAttribute('data-target');
                    document.getElementById(targetId).classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
